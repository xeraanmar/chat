<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Smart Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body[dir="ltr"] {
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
    </style>
</head>
<body class="register-page">
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="logo">
                    <i class="fas fa-user-plus"></i>
                    <h1>Create New Account</h1>
                </div>
                <p class="subtitle">Join the Smart Chat community</p>
            </div>
            
            <div class="register-body">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regUsername">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input type="text" id="regUsername" placeholder="Choose a unique username" required>
                        <div class="form-text" id="usernameFeedback"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="regEmail">
                            <i class="fas fa-envelope"></i> Email Address
                        </label>
                        <input type="email" id="regEmail" placeholder="Enter your email" required>
                        <div class="form-text" id="emailFeedback"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="regPassword">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <div class="password-input">
                            <input type="password" id="regPassword" placeholder="Strong password" required>
                            <button type="button" id="toggleRegPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                            <small id="strengthText">Password strength</small>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="regConfirmPassword">
                            <i class="fas fa-lock"></i> Confirm Password
                        </label>
                        <input type="password" id="regConfirmPassword" placeholder="Re-enter password" required>
                        <div class="form-text" id="confirmFeedback"></div>
                    </div>
                    
                    <button type="submit" class="register-btn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                    
                    <div class="register-footer">
                        <p>Already have an account? <a href="/">Login here</a></p>
                    </div>
                </form>
                
                <div id="message" class="message"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Password strength analyzer
        function analyzePasswordStrength() {
            const password = document.getElementById('regPassword').value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            let strength = 0;
            if (password.length >= 8) strength += 25;
            if (password.length >= 12) strength += 15;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 20;
            if (/\d/.test(password)) strength += 20;
            if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) strength += 20;
            
            bar.style.width = `${Math.min(strength, 100)}%`;
            
            if (strength < 40) {
                bar.style.background = '#ef4444';
                text.textContent = 'Weak';
            } else if (strength < 60) {
                bar.style.background = '#f59e0b';
                text.textContent = 'Medium';
            } else if (strength < 80) {
                bar.style.background = '#3b82f6';
                text.textContent = 'Good';
            } else {
                bar.style.background = '#10b981';
                text.textContent = 'Very Strong';
            }
        }
        
        // Check password match
        function checkPasswordMatch() {
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const feedback = document.getElementById('confirmFeedback');
            
            if (!confirmPassword) {
                feedback.textContent = '';
                return;
            }
            
            if (password !== confirmPassword) {
                feedback.textContent = '❌ Passwords do not match';
                feedback.style.color = '#ef4444';
            } else {
                feedback.textContent = '✅ Passwords match';
                feedback.style.color = '#10b981';
            }
        }
        
        // Check username
        function checkUsername() {
            const username = document.getElementById('regUsername').value;
            const feedback = document.getElementById('usernameFeedback');
            
            if (!username) {
                feedback.textContent = '';
                return;
            }
            
            if (username.length < 3) {
                feedback.textContent = '❌ Username must be at least 3 characters';
                feedback.style.color = '#ef4444';
            } else if (username.length > 20) {
                feedback.textContent = '❌ Username cannot exceed 20 characters';
                feedback.style.color = '#ef4444';
            } else {
                feedback.textContent = '✅ Username available';
                feedback.style.color = '#10b981';
            }
        }
        
        // Check email
        function checkEmail() {
            const email = document.getElementById('regEmail').value;
            const feedback = document.getElementById('emailFeedback');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!email) {
                feedback.textContent = '';
                return;
            }
            
            if (!emailRegex.test(email)) {
                feedback.textContent = '❌ Invalid email address';
                feedback.style.color = '#ef4444';
            } else {
                feedback.textContent = '✅ Valid email';
                feedback.style.color = '#10b981';
            }
        }
        
        // Submit registration form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            messageDiv.innerHTML = '';
            messageDiv.className = 'message';
            
            if (password !== confirmPassword) {
                messageDiv.innerHTML = '<i class="fas fa-times"></i> Passwords do not match';
                messageDiv.className = 'message error';
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.innerHTML = '<i class="fas fa-check"></i> Account created successfully!';
                    messageDiv.className = 'message success';
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                    
                } else {
                    messageDiv.innerHTML = `<i class="fas fa-times"></i> ${data.error}`;
                    messageDiv.className = 'message error';
                }
                
            } catch (error) {
                messageDiv.innerHTML = '<i class="fas fa-times"></i> Server connection error';
                messageDiv.className = 'message error';
            }
        });
        
        // Input events
        document.getElementById('regPassword').addEventListener('input', analyzePasswordStrength);
        document.getElementById('regConfirmPassword').addEventListener('input', checkPasswordMatch);
        document.getElementById('regUsername').addEventListener('input', checkUsername);
        document.getElementById('regEmail').addEventListener('input', checkEmail);
        
        // Show/Hide password
        document.getElementById('toggleRegPassword').addEventListener('click', function() {
            const passwordField = document.getElementById('regPassword');
            const icon = this.querySelector('i');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                passwordField.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });
    </script>
</body>
</html>
