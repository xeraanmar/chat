<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - دردشة ذكية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="register-page">
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="logo">
                    <i class="fas fa-user-plus"></i>
                    <h1>إنشاء حساب جديد</h1>
                </div>
                <p class="subtitle">انضم إلى مجتمع الدردشة الذكية</p>
            </div>
            
            <div class="register-body">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regUsername">
                            <i class="fas fa-user"></i> اسم المستخدم
                        </label>
                        <input type="text" id="regUsername" placeholder="اختر اسم مستخدم فريد" required>
                        <div class="form-text" id="usernameFeedback"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="regEmail">
                            <i class="fas fa-envelope"></i> البريد الإلكتروني
                        </label>
                        <input type="email" id="regEmail" placeholder="أدخل بريدك الإلكتروني" required>
                        <div class="form-text" id="emailFeedback"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="regPassword">
                            <i class="fas fa-lock"></i> كلمة المرور
                        </label>
                        <div class="password-input">
                            <input type="password" id="regPassword" placeholder="كلمة مرور قوية" required>
                            <button type="button" id="toggleRegPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                            <small id="strengthText">قوة كلمة المرور</small>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="regConfirmPassword">
                            <i class="fas fa-lock"></i> تأكيد كلمة المرور
                        </label>
                        <input type="password" id="regConfirmPassword" placeholder="أعد إدخال كلمة المرور" required>
                        <div class="form-text" id="confirmFeedback"></div>
                    </div>
                    
                    <button type="submit" class="register-btn">
                        <i class="fas fa-user-plus"></i> إنشاء حساب
                    </button>
                    
                    <div class="register-footer">
                        <p>لديك حساب بالفعل؟ <a href="/">سجل دخول</a></p>
                    </div>
                </form>
                
                <div id="message" class="message"></div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        // تحليل قوة كلمة المرور
        function analyzePasswordStrength() {
            const password = document.getElementById('regPassword').value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            let strength = 0;
            if (password.length >= 8) strength += 25;
            if (password.length >= 12) strength += 15;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 20;
            if (/\d/.test(password)) strength += 20;
            if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) strength += 20;
            
            bar.style.width = `${Math.min(strength, 100)}%`;
            
            if (strength < 40) {
                bar.style.background = '#ef4444';
                text.textContent = 'ضعيفة';
            } else if (strength < 60) {
                bar.style.background = '#f59e0b';
                text.textContent = 'متوسطة';
            } else if (strength < 80) {
                bar.style.background = '#3b82f6';
                text.textContent = 'جيدة';
            } else {
                bar.style.background = '#10b981';
                text.textContent = 'قوية جداً';
            }
        }
        
        // التحقق من تطابق كلمة المرور
        function checkPasswordMatch() {
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const feedback = document.getElementById('confirmFeedback');
            
            if (!confirmPassword) {
                feedback.textContent = '';
                return;
            }
            
            if (password !== confirmPassword) {
                feedback.textContent = '❌ كلمتا المرور غير متطابقتين';
                feedback.style.color = '#ef4444';
            } else {
                feedback.textContent = '✅ كلمتا المرور متطابقتين';
                feedback.style.color = '#10b981';
            }
        }
        
        // التحقق من اسم المستخدم
        function checkUsername() {
            const username = document.getElementById('regUsername').value;
            const feedback = document.getElementById('usernameFeedback');
            
            if (!username) {
                feedback.textContent = '';
                return;
            }
            
            if (username.length < 3) {
                feedback.textContent = '❌ يجب أن يكون الاسم 3 أحرف على الأقل';
                feedback.style.color = '#ef4444';
            } else if (username.length > 20) {
                feedback.textContent = '❌ يجب أن لا يزيد الاسم عن 20 حرفاً';
                feedback.style.color = '#ef4444';
            } else {
                feedback.textContent = '✅ اسم مستخدم صالح';
                feedback.style.color = '#10b981';
            }
        }
        
        // التحقق من البريد الإلكتروني
        function checkEmail() {
            const email = document.getElementById('regEmail').value;
            const feedback = document.getElementById('emailFeedback');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!email) {
                feedback.textContent = '';
                return;
            }
            
            if (!emailRegex.test(email)) {
                feedback.textContent = '❌ بريد إلكتروني غير صالح';
                feedback.style.color = '#ef4444';
            } else {
                feedback.textContent = '✅ بريد إلكتروني صالح';
                feedback.style.color = '#10b981';
            }
        }
        
        // إرسال نموذج التسجيل
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            messageDiv.innerHTML = '';
            messageDiv.className = 'message';
            
            if (password !== confirmPassword) {
                messageDiv.innerHTML = '<i class="fas fa-times"></i> كلمتا المرور غير متطابقتين';
                messageDiv.className = 'message error';
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.innerHTML = '<i class="fas fa-check"></i> تم إنشاء الحساب بنجاح!';
                    messageDiv.className = 'message success';
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                    
                } else {
                    messageDiv.innerHTML = `<i class="fas fa-times"></i> ${data.error}`;
                    messageDiv.className = 'message error';
                }
                
            } catch (error) {
                messageDiv.innerHTML = '<i class="fas fa-times"></i> خطأ في الاتصال بالخادم';
                messageDiv.className = 'message error';
            }
        });
        
        // أحداث المدخلات
        document.getElementById('regPassword').addEventListener('input', analyzePasswordStrength);
        document.getElementById('regConfirmPassword').addEventListener('input', checkPasswordMatch);
        document.getElementById('regUsername').addEventListener('input', checkUsername);
        document.getElementById('regEmail').addEventListener('input', checkEmail);
        
        // إظهار/إخفاء كلمة المرور
        document.getElementById('toggleRegPassword').addEventListener('click', function() {
            const passwordField = document.getElementById('regPassword');
            const icon = this.querySelector('i');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                passwordField.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });
    </script>
</body>
</html>
