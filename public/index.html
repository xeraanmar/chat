<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body[dir="ltr"] {
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-comments"></i>
                    <h1>Smart Chat</h1>
                </div>
                <p class="subtitle">Login to join the conversation</p>
            </div>
            
            <div class="login-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input type="text" id="username" placeholder="Enter your username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <div class="password-input">
                            <input type="password" id="password" placeholder="Enter your password" required>
                            <button type="button" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    
                    <div class="login-footer">
                        <p>Don't have an account? <a href="/register">Register Now</a></p>
                        <p class="server-status">
                            <i class="fas fa-circle online"></i>
                            <span id="statusText">Server Connected</span>
                        </p>
                    </div>
                </form>
                
                <div id="message" class="message"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Check server status
        async function checkServerStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                document.getElementById('statusText').textContent = `Server Online (${data.users} users)`;
                return true;
            } catch (error) {
                document.getElementById('statusText').textContent = 'Connecting...';
                return false;
            }
        }
        
        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            messageDiv.innerHTML = '';
            messageDiv.className = 'message';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.innerHTML = '<i class="fas fa-check"></i> Login successful!';
                    messageDiv.className = 'message success';
                    
                    // Save token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    
                    // Redirect to chat
                    setTimeout(() => {
                        window.location.href = '/chat';
                    }, 1000);
                    
                } else {
                    messageDiv.innerHTML = `<i class="fas fa-times"></i> ${data.error}`;
                    messageDiv.className = 'message error';
                }
                
            } catch (error) {
                messageDiv.innerHTML = '<i class="fas fa-times"></i> Server connection error';
                messageDiv.className = 'message error';
            }
        });
        
        // Show/Hide password
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordField = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                passwordField.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });
        
        // Check server status on load
        checkServerStatus();
        setInterval(checkServerStatus, 30000);
    </script>
</body>
</html>
