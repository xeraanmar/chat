<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Chat - Smart Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body[dir="ltr"] {
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
    </style>
</head>
<body class="chat-page">
    <div class="chat-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">
                        <!-- Will be filled by JavaScript -->
                    </div>
                    <div class="user-details">
                        <h3 id="usernameDisplay"></h3>
                        <p class="online-status"><i class="fas fa-circle online"></i> Online</p>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            
            <div class="online-users">
                <h4><i class="fas fa-users"></i> Online Users</h4>
                <div class="users-list" id="usersList">
                    <!-- Will be filled by JavaScript -->
                </div>
            </div>
            
            <div class="sidebar-footer">
                <p id="onlineCount">0 online</p>
                <p class="server-info">
                    <i class="fas fa-server"></i>
                    <span id="serverStatus">● Connected</span>
                </p>
            </div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <h2><i class="fas fa-comments"></i> General Chat</h2>
                <div class="chat-info">
                    <span id="messageCount">0 messages</span>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- Messages will appear here -->
                <div class="welcome-message">
                    <h3>Welcome to the Chat!</h3>
                    <p>Start communicating with others...</p>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator"></div>
            
            <div class="chat-input-area">
                <div class="input-container">
                    <input type="text" id="messageInput" placeholder="Type your message here..." autocomplete="off">
                    <button class="send-btn" id="sendButton">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
                <div class="input-options">
                    <label for="imageUpload" class="option-btn" title="Send image">
                        <i class="fas fa-image"></i>
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                    <button class="option-btn" title="Send file">
                        <i class="fas fa-paperclip"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Initialize variables
        let socket;
        let username;
        let token;
        let typingTimeout;
        
        // Load user data
        document.addEventListener('DOMContentLoaded', function() {
            username = localStorage.getItem('username');
            token = localStorage.getItem('token');
            
            if (!username || !token) {
                window.location.href = '/';
                return;
            }
            
            // Update user info
            document.getElementById('usernameDisplay').textContent = username;
            document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();
            
            // Connect to server
            socket = io();
            
            socket.on('connect', () => {
                console.log('✅ Connected to server');
                socket.emit('join-chat', { username, token });
            });
            
            // Receive messages
            socket.on('welcome', (data) => {
                console.log(data.message);
                updateUsersList(data.users);
            });
            
            socket.on('previous-messages', (messages) => {
                messages.forEach(message => {
                    addMessage(message, message.username === username);
                });
                updateMessageCount();
            });
            
            socket.on('new-message', (message) => {
                addMessage(message, message.username === username);
                updateMessageCount();
            });
            
            socket.on('user-joined', (data) => {
                addSystemMessage(`${data.username} joined the chat`, 'join');
                socket.emit('get-users');
            });
            
            socket.on('user-left', (data) => {
                addSystemMessage(`${data.username} left the chat`, 'left');
                socket.emit('get-users');
            });
            
            socket.on('user-typing', (data) => {
                const indicator = document.getElementById('typingIndicator');
                if (data.isTyping && data.username !== username) {
                    indicator.textContent = `${data.username} is typing...`;
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => {
                        indicator.textContent = '';
                    }, 1000);
                }
            });
            
            socket.on('auth-error', () => {
                alert('Session expired, please login again');
                logout();
            });
            
            // Request users list
            socket.emit('get-users');
            
            // Setup input events
            document.getElementById('sendButton').addEventListener('click', sendMessage);
            document.getElementById('messageInput').addEventListener('keypress', handleKeyPress);
            document.getElementById('messageInput').addEventListener('input', handleTyping);
        });
        
        // Add message to interface
        function addMessage(message, isSent) {
            const messagesContainer = document.getElementById('chatMessages');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <div class="message-sender">${message.username}</div>
                    <div class="message-time">${message.time}</div>
                </div>
                <div class="message-content">${escapeHtml(message.message)}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Hide welcome message
            document.querySelector('.welcome-message').style.display = 'none';
        }
        
        // Add system message
        function addSystemMessage(text, type) {
            const messagesContainer = document.getElementById('chatMessages');
            
            const systemDiv = document.createElement('div');
            systemDiv.className = 'system-message';
            systemDiv.innerHTML = `
                <i class="fas fa-info-circle"></i>
                <span>${text}</span>
            `;
            
            messagesContainer.appendChild(systemDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Send message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            socket.emit('send-message', { text: message });
            input.value = '';
            
            socket.emit('typing', false);
        }
        
        // Handle Enter key press
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        // Handle typing
        function handleTyping() {
            const message = document.getElementById('messageInput').value;
            socket.emit('typing', message.length > 0);
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', false);
            }, 1000);
        }
        
        // Update message count
        function updateMessageCount() {
            const count = document.querySelectorAll('.message').length;
            document.getElementById('messageCount').textContent = `${count} messages`;
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/';
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Update users list
        function updateUsersList(users) {
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '';
            
            users.forEach(user => {
                const userItem = document.createElement('div');
                userItem.className = 'user-item';
                userItem.innerHTML = `
                    <div class="user-avatar-small">${user.charAt(0).toUpperCase()}</div>
                    <div class="user-name">${user}</div>
                `;
                usersList.appendChild(userItem);
            });
            
            document.getElementById('onlineCount').textContent = `${users.length} online`;
        }
    </script>
</body>
</html>
