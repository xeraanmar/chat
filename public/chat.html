<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدردشة العامة 💬</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0a0a;
            color: #e4e6eb;
            height: 100vh;
            overflow: hidden;
        }
        
        .app-container {
            display: flex;
            height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* الشريط الجانبي */
        .sidebar {
            width: 300px;
            background: #1a1a1a;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            padding: 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            text-align: center;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .online-count {
            color: #10b981;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .online-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: #252525;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .user-item:hover {
            background: #2a2a2a;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-left: 15px;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 500;
        }
        
        .user-status {
            font-size: 0.8rem;
            color: #888;
        }
        
        /* منطقة الدردشة الرئيسية */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
        }
        
        .chat-header {
            padding: 15px 25px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chat-title h2 {
            font-size: 1.3rem;
            color: #fff;
        }
        
        .chat-info {
            font-size: 0.9rem;
            color: #888;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* الرسائل */
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            animation: messageAppear 0.3s ease;
        }
        
        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-bottom-right-radius: 5px;
        }
        
        .message.received {
            align-self: flex-start;
            background: #252525;
            border-bottom-left-radius: 5px;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .sender-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .message-time {
            font-size: 0.75rem;
            opacity: 0.8;
        }
        
        .message-content {
            font-size: 1rem;
            line-height: 1.5;
        }
        
        /* شريط إدخال الرسالة */
        .message-input-area {
            padding: 20px;
            background: #1a1a1a;
            border-top: 1px solid #333;
        }
        
        .input-container {
            display: flex;
            gap: 10px;
            background: #252525;
            border-radius: 25px;
            padding: 10px 20px;
        }
        
        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            outline: none;
        }
        
        #messageInput::placeholder {
            color: #666;
        }
        
        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
        }
        
        .send-btn:active {
            transform: scale(0.95);
        }
        
        .typing-indicator {
            padding: 0 25px;
            font-size: 0.9rem;
            color: #667eea;
            height: 20px;
            font-style: italic;
        }
        
        /* نصوص الترحيب */
        .welcome-message {
            background: #252525;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin: 20px;
            border: 1px solid #333;
        }
        
        .welcome-message h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        /* التمرير */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
        
        /* التجاوب مع الشاشات الصغيرة */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .message {
                max-width: 85%;
            }
        }
        
        /* أنيميشن للرسائل الجديدة */
        .new-message {
            animation: highlight 1s ease;
        }
        
        @keyframes highlight {
            0% { background-color: rgba(102, 126, 234, 0.3); }
            100% { background-color: transparent; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- الشريط الجانبي -->
        <div class="sidebar">
            <div class="header">
                <h1>💬 دردشة عربية</h1>
                <div class="online-count">
                    <div class="online-dot"></div>
                    <span id="onlineCount">1</span> متصل الآن
                </div>
            </div>
            
            <div class="users-list" id="usersList">
                <!-- سيتم ملئها بالجافاسكريبت -->
            </div>
            
            <div class="welcome-message">
                <h3>👋 أهلًا وسهلًا!</h3>
                <p>أنت في دردشة عربية عامة، شارك حديثك مع الجميع</p>
                <p style="margin-top: 10px; font-size: 0.9rem; color: #888;">
                    <i class="fas fa-lightbulb"></i> نصيحة: كن محترمًا مع الجميع
                </p>
            </div>
        </div>
        
        <!-- منطقة الدردشة الرئيسية -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-title">
                    <h2>الدردشة العامة</h2>
                    <div class="chat-info" id="connectionStatus">
                        <span id="userCount">1</span> مستخدم متصل
                    </div>
                </div>
                <button onclick="location.href='/'" style="background: transparent; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- سيتم ملئها بالرسائل -->
                <div class="welcome-message" id="welcomeMessage">
                    <h3>مرحبًا بك في الدردشة!</h3>
                    <p>ابدأ بكتابة رسالتك الأولى في الأسفل</p>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator"></div>
            
            <div class="message-input-area">
                <div class="input-container">
                    <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." autocomplete="off">
                    <button class="send-btn" id="sendButton">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // التحقق من اسم المستخدم
        const username = localStorage.getItem('chatUsername');
        if (!username) {
            window.location.href = '/';
        }
        
        // الاتصال بالخادم
        const socket = io();
        
        // عناصر DOM
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const onlineCount = document.getElementById('onlineCount');
        const userCount = document.getElementById('userCount');
        const usersList = document.getElementById('usersList');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const typingIndicator = document.getElementById('typingIndicator');
        
        let typingTimeout;
        let activeUsers = [];
        
        // انضمام للدردشة
        socket.emit('join', username);
        
        // استقبال رسالة ترحيبية
        socket.on('welcome', (data) => {
            console.log(data.message);
            updateOnlineCount(data.usersCount);
            
            // إخفاء رسالة الترحيب الافتراضية
            welcomeMessage.style.display = 'none';
        });
        
        // استقبال قائمة المستخدمين
        socket.on('active-users', (users) => {
            activeUsers = users;
            updateUsersList(users);
            updateOnlineCount(users.length);
        });
        
        // استقبال رسالة جديدة
        socket.on('new-message', (message) => {
            addMessage(message, message.username === username);
        });
        
        // مستخدم انضم
        socket.on('user-joined', (data) => {
            addSystemMessage(`${data.username} انضم للدردشة`, 'join');
            updateOnlineCount(data.usersCount);
        });
        
        // مستخدم غادر
        socket.on('user-left', (data) => {
            addSystemMessage(`${data.username} غادر الدردشة`, 'left');
            updateOnlineCount(data.usersCount);
        });
        
        // شخص يكتب
        socket.on('user-typing', (data) => {
            if (data.isTyping && data.username !== username) {
                typingIndicator.textContent = `${data.username} يكتب...`;
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    typingIndicator.textContent = '';
                }, 1000);
            }
        });
        
        // أخطاء
        socket.on('error', (error) => {
            alert(error);
        });
        
        // تحديث قائمة المستخدمين
        function updateUsersList(users) {
            usersList.innerHTML = '';
            users.forEach(user => {
                const userItem = document.createElement('div');
                userItem.className = 'user-item';
                userItem.innerHTML = `
                    <div class="user-avatar">${user.charAt(0)}</div>
                    <div class="user-info">
                        <div class="user-name">${user}</div>
                        <div class="user-status">متصل الآن</div>
                    </div>
                `;
                usersList.appendChild(userItem);
            });
        }
        
        // تحديث عدد المستخدمين
        function updateOnlineCount(count) {
            onlineCount.textContent = count;
            userCount.textContent = `${count} مستخدم${count > 2 ? 'ين' : count === 2 ? 'ان' : ''} متصل`;
        }
        
        // إضافة رسالة للنظام
        function addSystemMessage(text, type = 'info') {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message system-message';
            messageDiv.style.alignSelf = 'center';
            messageDiv.style.maxWidth = '90%';
            messageDiv.style.textAlign = 'center';
            messageDiv.style.padding = '8px 20px';
            messageDiv.style.backgroundColor = type === 'join' ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)';
            messageDiv.style.color = type === 'join' ? '#10b981' : '#ef4444';
            messageDiv.style.borderRadius = '15px';
            messageDiv.style.fontSize = '0.9rem';
            messageDiv.style.margin = '10px 0';
            messageDiv.textContent = text;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // إضافة رسالة عادية
        function addMessage(message, isSent = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'} new-message`;
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <div class="sender-name">${message.username}</div>
                    <div class="message-time">${message.time}</div>
                </div>
                <div class="message-content">${escapeHtml(message.message)}</div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // إخفاء رسالة الترحيب الافتراضية
            welcomeMessage.style.display = 'none';
        }
        
        // إرسال رسالة
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            socket.emit('send-message', { message });
            messageInput.value = '';
            
            // إخبار الآخرين أنني توقفت عن الكتابة
            socket.emit('typing', false);
        }
        
        // تهريب HTML لمنع XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // الأحداث
        sendButton.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // كشف الكتابة
        messageInput.addEventListener('input', () => {
            if (messageInput.value.trim()) {
                socket.emit('typing', true);
            } else {
                socket.emit('typing', false);
            }
            
            // إعادة تعيين مؤقت الكتابة
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', false);
            }, 1000);
        });
        
        // التركيز على حقل الإدخال عند التحميل
        messageInput.focus();
        
        // إظهار اسم المستخدم في عنوان الصفحة
        document.title = `الدردشة - ${username}`;
    </script>
</body>
</html>
