<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room | Smart Chat Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --dark-bg: #0f172a;
            --darker-bg: #0a1120;
            --sidebar-bg: rgba(30, 41, 59, 0.95);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-color: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Background Effects */
        .bg-noise {
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            z-index: -2;
            opacity: 0.4;
            pointer-events: none;
        }
        
        .bg-glow {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }
        
        /* Chat Container */
        .chat-container {
            min-height: 100vh;
            position: relative;
        }
        
        /* Sidebar */
        .sidebar {
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-right: 1px solid var(--border-color);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            overflow-y: auto;
            transition: transform 0.3s ease;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.3);
        }
        
        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
                width: 300px;
            }
            
            .sidebar.show {
                transform: translateX(0);
            }
        }
        
        @media (min-width: 992px) {
            .sidebar {
                width: 320px;
            }
        }
        
        .sidebar-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }
        
        .sidebar-backdrop.show {
            display: block;
        }
        
        /* User Profile */
        .user-profile {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.3);
        }
        
        .avatar-large {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 600;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        
        .avatar-large::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            padding: 2px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }
        
        .user-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a8b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        /* Online Users */
        .online-users {
            padding: 1.5rem;
            flex-grow: 1;
            overflow-y: auto;
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        .section-title i {
            color: var(--primary-color);
            font-size: 1.2rem;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .user-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }
        
        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        
        /* Sidebar Footer */
        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.3);
        }
        
        /* Main Chat Area */
        .main-chat-area {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }
        
        @media (min-width: 992px) {
            .main-chat-area {
                margin-left: 320px;
            }
        }
        
        /* Chat Header */
        .chat-header {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .chat-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        
        .chat-info h2 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a8b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        .messages-scroll {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* Welcome Message */
        .welcome-message {
            text-align: center;
            padding: 3rem 1rem;
            animation: fadeIn 1s ease;
        }
        
        .welcome-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: white;
        }
        
        /* Message Styles */
        .message {
            max-width: 85%;
            padding: 20px;
            border-radius: 20px;
            position: relative;
            animation: messageSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin-bottom: 1.5rem;
        }
        
        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .message-sent {
            margin-left: auto;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9), rgba(118, 75, 162, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom-right-radius: 5px;
        }
        
        .message-received {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 5px;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .message-sender {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .sender-avatar {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .message-sent .sender-avatar {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .message-received .sender-avatar {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }
        
        .message-content {
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 1.05rem;
        }
        
        .message-sent .message-content {
            color: white;
        }
        
        .message-received .message-content {
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* System Message */
        .system-message {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px 25px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 500px;
            margin: 10px auto;
            backdrop-filter: blur(10px);
        }
        
        /* Typing Indicator */
        .typing-container {
            padding: 0 1.5rem 1rem;
        }
        
        .typing-bubble {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            padding: 12px 20px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--primary-color);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
        
        /* Chat Input Area */
        .input-area {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            position: sticky;
            bottom: 0;
            z-index: 100;
        }
        
        .message-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 1.05rem;
            font-family: 'Inter', sans-serif;
            resize: none;
            transition: all 0.3s;
            min-height: 56px;
            max-height: 120px;
            padding: 1rem;
        }
        
        .message-input:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .send-button {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 16px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        
        /* Custom Button Styles */
        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            font-weight: 500;
            padding: 0.75rem;
            border-radius: 14px;
            transition: all 0.3s;
        }
        
        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-1px);
            color: #ef4444;
        }
        
        .action-button {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 14px;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Custom Scrollbar */
        .sidebar::-webkit-scrollbar,
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .sidebar::-webkit-scrollbar-track,
        .messages-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
        
        .sidebar::-webkit-scrollbar-thumb,
        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        
        /* Utility Classes */
        .text-gradient {
            background: linear-gradient(135deg, #fff, #a8b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .text-muted-light {
            color: rgba(255, 255, 255, 0.7) !important;
        }
        
        .bg-card {
            background: var(--card-bg);
        }
        
        .border-light {
            border-color: var(--border-color) !important;
        }
    </style>
</head>
<body class="chat-page">
    <!-- Background Effects -->
    <div class="bg-noise"></div>
    <div class="bg-glow"></div>
    
    <!-- Sidebar Backdrop (for mobile) -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    
    <!-- Chat Container -->
    <div class="chat-container">
        <!-- Sidebar -->
        <aside class="sidebar d-flex flex-column" id="sidebar">
            <!-- User Profile -->
            <div class="user-profile">
                <div class="d-flex align-items-center mb-3">
                    <div class="avatar-large me-3" id="userAvatar">
                        <!-- Initial will be set by JS -->
                    </div>
                    <div class="user-info">
                        <h3 id="usernameDisplay">Loading...</h3>
                        <div class="user-status">
                            <span class="status-dot"></span>
                            <span>Online</span>
                        </div>
                    </div>
                </div>
                <button class="btn btn-logout w-100 d-flex align-items-center justify-content-center gap-2" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
            
            <!-- Online Users -->
            <div class="online-users flex-grow-1">
                <div class="section-title">
                    <i class="fas fa-users"></i>
                    <span>Online Users</span>
                </div>
                <div class="users-list" id="usersList">
                    <!-- Users will be populated by JavaScript -->
                    <div class="loading-users">
                        <div class="user-item">
                            <div class="user-avatar skeleton"></div>
                            <div class="user-details">
                                <div class="user-name skeleton-text"></div>
                                <div class="user-activity skeleton-text"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Sidebar Footer -->
            <div class="sidebar-footer">
                <div class="server-info">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-muted-light">Online Users</span>
                        <span class="text-success fw-bold" id="onlineCount">0</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-muted-light">Messages</span>
                        <span class="fw-bold text-white" id="messageCount">0</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-muted-light">Server</span>
                        <span class="fw-bold text-success" id="serverStatus">● Online</span>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Main Chat Area -->
        <main class="main-chat-area">
            <!-- Chat Header -->
            <header class="chat-header">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <!-- Mobile Menu Toggle -->
                        <button class="mobile-menu-toggle me-3 d-lg-none" id="menuToggle">
                            <i class="fas fa-bars"></i>
                        </button>
                        
                        <div class="chat-icon me-3">
                            <i class="fas fa-comments"></i>
                        </div>
                        <div class="chat-info">
                            <h2 class="mb-1">General Chat</h2>
                            <div class="chat-subtitle text-muted-light">Real-time conversations with the community</div>
                        </div>
                    </div>
                    
                    <div class="d-none d-md-flex align-items-center">
                        <div class="text-center me-4">
                            <div class="stat-value fs-4 fw-bold" id="totalUsers">0</div>
                            <div class="stat-label text-muted-light">Total Users</div>
                        </div>
                        <div class="text-center">
                            <div class="stat-value fs-4 fw-bold" id="activeChats">1</div>
                            <div class="stat-label text-muted-light">Active Chats</div>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- Messages Container -->
            <div class="messages-container flex-grow-1" id="messagesContainer">
                <div class="messages-scroll" id="messagesScroll">
                    <!-- Welcome Message -->
                    <div class="welcome-message" id="welcomeMessage">
                        <div class="welcome-icon">
                            <i class="fas fa-comment-dots"></i>
                        </div>
                        <h3 class="text-gradient mb-3">Welcome to Smart Chat!</h3>
                        <p class="text-muted-light">Start connecting with people from around the world. Your messages will appear here once you begin chatting.</p>
                    </div>
                    
                    <!-- Messages will be inserted here by JavaScript -->
                </div>
            </div>
            
            <!-- Typing Indicator -->
            <div class="typing-container" id="typingContainer">
                <!-- Typing indicator will be inserted here -->
            </div>
            
            <!-- Chat Input Area -->
            <div class="input-area">
                <div class="row g-2 align-items-center">
                    <div class="col-auto">
                        <div class="input-actions d-flex gap-2">
                            <button class="action-button" title="Attach file" onclick="document.getElementById('fileUpload').click()">
                                <i class="fas fa-paperclip"></i>
                            </button>
                            <button class="action-button" title="Send image" onclick="document.getElementById('imageUpload').click()">
                                <i class="fas fa-image"></i>
                            </button>
                            <input type="file" id="fileUpload" accept=".txt,.pdf,.doc,.docx" style="display: none;">
                            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                        </div>
                    </div>
                    
                    <div class="col">
                        <textarea 
                            class="message-input form-control" 
                            id="messageInput" 
                            placeholder="Type your message here..." 
                            rows="1"
                            oninput="autoResize(this); handleTyping()"
                            onkeydown="handleKeyDown(event)"
                        ></textarea>
                    </div>
                    
                    <div class="col-auto">
                        <button class="send-button" id="sendButton" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Socket.IO Library -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- Main Chat JavaScript -->
    <script>
        // Global variables
        let socket;
        let username;
        let token;
        let userData;
        let typingTimeout;
        let isTyping = false;
        let onlineUsers = new Map();
        let userColors = new Map();
        
        // DOM Elements
        const elements = {
            sidebar: document.getElementById('sidebar'),
            menuToggle: document.getElementById('menuToggle'),
            sidebarBackdrop: document.getElementById('sidebarBackdrop'),
            usernameDisplay: document.getElementById('usernameDisplay'),
            userAvatar: document.getElementById('userAvatar'),
            usersList: document.getElementById('usersList'),
            onlineCount: document.getElementById('onlineCount'),
            messageCount: document.getElementById('messageCount'),
            totalUsers: document.getElementById('totalUsers'),
            messagesContainer: document.getElementById('messagesContainer'),
            messagesScroll: document.getElementById('messagesScroll'),
            welcomeMessage: document.getElementById('welcomeMessage'),
            typingContainer: document.getElementById('typingContainer'),
            messageInput: document.getElementById('messageInput'),
            sendButton: document.getElementById('sendButton')
        };
        
        // Initialize the chat
        document.addEventListener('DOMContentLoaded', async function() {
            // Check authentication
            await checkAuth();
            
            // Initialize user interface
            initializeUI();
            
            // Setup mobile sidebar toggle
            setupMobileSidebar();
            
            // Connect to WebSocket
            connectSocket();
            
            // Setup event listeners
            setupEventListeners();
            
            // Update server status
            updateServerStatus();
        });
        
        // Setup mobile sidebar toggle
        function setupMobileSidebar() {
            elements.menuToggle.addEventListener('click', function() {
                elements.sidebar.classList.add('show');
                elements.sidebarBackdrop.classList.add('show');
            });
            
            elements.sidebarBackdrop.addEventListener('click', function() {
                elements.sidebar.classList.remove('show');
                elements.sidebarBackdrop.classList.remove('show');
            });
            
            // Close sidebar when clicking outside on mobile
            document.addEventListener('click', function(event) {
                const isClickInsideSidebar = elements.sidebar.contains(event.target);
                const isClickOnMenuToggle = elements.menuToggle.contains(event.target);
                
                if (window.innerWidth < 992 && !isClickInsideSidebar && !isClickOnMenuToggle) {
                    elements.sidebar.classList.remove('show');
                    elements.sidebarBackdrop.classList.remove('show');
                }
            });
        }
        
        // Check authentication
        async function checkAuth() {
            username = localStorage.getItem('username');
            token = localStorage.getItem('token');
            userData = JSON.parse(localStorage.getItem('userData') || '{}');
            
            if (!username || !token) {
                window.location.href = '/';
                return;
            }
            
            // Verify token with server
            try {
                const response = await fetch('/api/verify', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'x-access-token': token
                    }
                });
                
                const data = await response.json();
                
                if (!data.valid) {
                    localStorage.clear();
                    window.location.href = '/';
                    return;
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                localStorage.clear();
                window.location.href = '/';
            }
        }
        
        // Initialize user interface
        function initializeUI() {
            // Set username and avatar
            elements.usernameDisplay.textContent = username;
            elements.userAvatar.textContent = username.charAt(0).toUpperCase();
            
            // Set random color for user
            const userColor = userData.avatarColor || generateColorFromName(username);
            elements.userAvatar.style.background = userColor;
            userColors.set(username, userColor);
            
            // Update user info in sidebar
            updateUserStats();
        }
        
        // Connect to WebSocket
        function connectSocket() {
            socket = io({
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 5,
                reconnectionDelay: 1000
            });
            
            // Socket event handlers
            socket.on('connect', handleSocketConnect);
            socket.on('disconnect', handleSocketDisconnect);
            socket.on('connect_error', handleSocketError);
            
            // Chat event handlers
            socket.on('welcome', handleWelcome);
            socket.on('users-update', handleUsersUpdate);
            socket.on('previous-messages', handlePreviousMessages);
            socket.on('new-message', handleNewMessage);
            socket.on('user-joined', handleUserJoined);
            socket.on('user-left', handleUserLeft);
            socket.on('user-typing', handleUserTyping);
            socket.on('auth-error', handleAuthError);
            socket.on('error', handleError);
        }
        
        // Setup event listeners
        function setupEventListeners() {
            // Auto-resize textarea
            elements.messageInput.addEventListener('input', function() {
                autoResize(this);
            });
            
            // Send message on Enter (without Shift)
            elements.messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // Typing indicator
            elements.messageInput.addEventListener('input', handleTyping);
            
            // Scroll to bottom when new messages arrive
            const observer = new MutationObserver(scrollToBottom);
            observer.observe(elements.messagesScroll, { childList: true });
            
            // Handle window resize
            window.addEventListener('resize', function() {
                if (window.innerWidth >= 992) {
                    elements.sidebar.classList.remove('show');
                    elements.sidebarBackdrop.classList.remove('show');
                }
            });
        }
        
        // Socket event handlers
        function handleSocketConnect() {
            console.log('✅ Connected to chat server');
            updateServerStatus('● Online', '#10b981');
            
            // Join chat room
            socket.emit('join-chat', {
                username: username,
                token: token
            });
        }
        
        function handleSocketDisconnect(reason) {
            console.log('❌ Disconnected from chat server:', reason);
            updateServerStatus('● Connecting...', '#f59e0b');
            
            // Show reconnection message
            if (reason === 'io server disconnect') {
                showSystemMessage('Disconnected from server. Reconnecting...', 'warning');
            }
        }
        
        function handleSocketError(error) {
            console.error('Socket connection error:', error);
            updateServerStatus('● Error', '#ef4444');
            
            showSystemMessage('Connection error. Please refresh the page.', 'error');
        }
        
        function handleWelcome(data) {
            console.log('Welcome message:', data.message);
            
            // Update user stats
            elements.totalUsers.textContent = data.serverInfo.onlineCount || 1;
            elements.messageCount.textContent = data.serverInfo.totalMessages || 0;
            
            // Store user color if provided
            if (data.user?.avatarColor) {
                userColors.set(username, data.user.avatarColor);
                elements.userAvatar.style.background = data.user.avatarColor;
            }
            
            // Show welcome message
            if (data.success) {
                showSystemMessage(data.message, 'success');
            }
        }
        
        function handleUsersUpdate(data) {
            updateOnlineUsers(data.users);
            elements.onlineCount.textContent = data.count;
            elements.totalUsers.textContent = data.count;
        }
        
        function handlePreviousMessages(messages) {
            // Hide welcome message if there are previous messages
            if (messages.length > 0) {
                elements.welcomeMessage.style.display = 'none';
            }
            
            // Display previous messages
            messages.forEach(message => {
                addMessage(message, message.username === username);
            });
            
            // Scroll to bottom
            scrollToBottom();
            
            // Update message count
            elements.messageCount.textContent = messages.length;
        }
        
        function handleNewMessage(message) {
            // Hide welcome message
            elements.welcomeMessage.style.display = 'none';
            
            // Add new message
            addMessage(message, message.username === username);
            
            // Scroll to bottom
            scrollToBottom();
            
            // Update message count
            const currentCount = parseInt(elements.messageCount.textContent) || 0;
            elements.messageCount.textContent = currentCount + 1;
        }
        
        function handleUserJoined(data) {
            showSystemMessage(`${data.username} joined the chat`, 'info');
            
            // Store user color if provided
            if (data.avatarColor) {
                userColors.set(data.username, data.avatarColor);
            }
        }
        
        function handleUserLeft(data) {
            showSystemMessage(`${data.username} left the chat`, 'info');
        }
        
        function handleUserTyping(data) {
            if (data.username === username) return;
            
            if (data.isTyping) {
                showTypingIndicator(data.username, data.avatarColor);
            } else {
                hideTypingIndicator();
            }
        }
        
        function handleAuthError(data) {
            alert(data.message || 'Session expired. Please login again.');
            logout();
        }
        
        function handleError(data) {
            console.error('Server error:', data);
            showSystemMessage(data.message || 'An error occurred', 'error');
        }
        
        // UI Functions
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }
        
        function scrollToBottom() {
            elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
        }
        
        function updateServerStatus(text = '● Online', color = '#10b981') {
            const statusElement = document.getElementById('serverStatus');
            if (statusElement) {
                statusElement.textContent = text;
                statusElement.style.color = color;
            }
        }
        
        function updateUserStats() {
            // Update total users count (simulated - in real app, get from server)
            const totalUsers = Math.floor(Math.random() * 1000) + 500;
            elements.totalUsers.textContent = totalUsers.toLocaleString();
        }
        
        function updateOnlineUsers(users) {
            onlineUsers.clear();
            elements.usersList.innerHTML = '';
            
            users.forEach(user => {
                onlineUsers.set(user.username, user);
                
                // Store user color
                if (user.avatarColor) {
                    userColors.set(user.username, user.avatarColor);
                }
                
                // Create user element
                const userElement = createUserElement(user);
                elements.usersList.appendChild(userElement);
            });
        }
        
        function createUserElement(user) {
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `
                <div class="user-avatar" style="background: ${userColors.get(user.username) || generateColorFromName(user.username)};">
                    ${user.username.charAt(0).toUpperCase()}
                </div>
                <div class="user-details">
                    <div class="user-name">${user.username}</div>
                    <div class="user-activity">
                        ${user.isTyping ? '<span class="typing-indicator">typing...</span>' : 'online'}
                    </div>
                </div>
            `;
            
            return div;
        }
        
        // Message Functions
        function addMessage(message, isSent = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'message-sent' : 'message-received'}`;
            
            const messageColor = userColors.get(message.username) || generateColorFromName(message.username);
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <div class="message-sender">
                        <div class="sender-avatar" style="background: ${messageColor}">
                            ${message.username.charAt(0).toUpperCase()}
                        </div>
                        <span>${message.username}</span>
                    </div>
                    <div class="message-time">${message.time}</div>
                </div>
                <div class="message-content">${escapeHtml(message.message)}</div>
            `;
            
            elements.messagesScroll.appendChild(messageDiv);
            
            // Add animation
            messageDiv.style.animation = 'messageSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        }
        
        function showSystemMessage(text, type = 'info') {
            const systemDiv = document.createElement('div');
            systemDiv.className = 'system-message';
            
            const icons = {
                info: 'fa-info-circle',
                success: 'fa-check-circle',
                warning: 'fa-exclamation-circle',
                error: 'fa-times-circle'
            };
            
            systemDiv.innerHTML = `
                <i class="fas ${icons[type] || 'fa-info-circle'}"></i>
                <span>${text}</span>
            `;
            
            elements.messagesScroll.appendChild(systemDiv);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                if (systemDiv.parentNode) {
                    systemDiv.style.opacity = '0';
                    systemDiv.style.transform = 'translateY(-10px)';
                    setTimeout(() => systemDiv.remove(), 300);
                }
            }, 5000);
        }
        
        function showTypingIndicator(username, color) {
            hideTypingIndicator(); // Clear existing indicator
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-bubble';
            typingDiv.innerHTML = `
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
                <div class="typing-text">${username} is typing</div>
            `;
            
            elements.typingContainer.appendChild(typingDiv);
        }
        
        function hideTypingIndicator() {
            elements.typingContainer.innerHTML = '';
        }
        
        // Chat Functions
        function sendMessage() {
            const message = elements.messageInput.value.trim();
            
            if (!message) return;
            
            // Send message via socket
            socket.emit('send-message', { text: message });
            
            // Clear input
            elements.messageInput.value = '';
            elements.messageInput.style.height = 'auto';
            
            // Reset typing state
            isTyping = false;
            socket.emit('typing', false);
            
            // Focus input for next message
            elements.messageInput.focus();
        }
        
        function handleTyping() {
            const message = elements.messageInput.value;
            const typing = message.length > 0;
            
            if (typing !== isTyping) {
                isTyping = typing;
                socket.emit('typing', typing);
            }
            
            // Reset typing timeout
            clearTimeout(typingTimeout);
            if (typing) {
                typingTimeout = setTimeout(() => {
                    isTyping = false;
                    socket.emit('typing', false);
                }, 1000);
            }
        }
        
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        // Utility Functions
        function generateColorFromName(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            
            const hue = hash % 360;
            return `hsl(${hue}, 70%, 60%)`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Logout function
        function logout() {
            if (socket) {
                socket.disconnect();
            }
            
            localStorage.clear();
            window.location.href = '/';
        }
        
        // Export functions for HTML onclick
        window.logout = logout;
        window.sendMessage = sendMessage;
        window.handleKeyDown = handleKeyDown;
        window.autoResize = autoResize;
        window.handleTyping = handleTyping;
    </script>
</body>
</html>
